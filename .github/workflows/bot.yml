name: Run Telegram Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Download code
      uses: actions/checkout@v3

    - name: Install Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install packages
      run: npm install

    - name: Run bot
      run: node bot.js
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}